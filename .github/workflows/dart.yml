name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Dependencies
        # If your flutter folder isn't named 'frontend', change this:
        working-directory: frontend 
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🍏 Install Pods
        working-directory: frontend/ios
        run: pod install --repo-update

      - name: 🛠️ Build iOS (Unsigned)
        working-directory: frontend
        run: |
          # We use --no-codesign because GitHub runners don't have your Apple certs
          flutter build ios --release --no-codesign

      - name: 🏗️ Create IPA Structure
        run: |
          # 1. Navigate to the build output inside the frontend folder
          cd frontend/build/ios/iphoneos
          
          # 2. Create the Payload folder required for .ipa files
          mkdir Payload
          
          # 3. Copy the .app bundle into Payload
          cp -r Runner.app Payload/
          
          # 4. Zip it up into an IPA
          zip -qq -r -9 GroceryApp.ipa Payload
          
          echo "IPA created at: $(pwd)/GroceryApp.ipa"

      - name: 🚀 Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # Path must include the frontend prefix
          file: frontend/build/ios/iphoneos/GroceryApp.ipa
          asset_name: GroceryApp-Unsigned.ipa
          tag: v1.0.0
          overwrite: true
          body: "Automated iOS build for the Grocery Sync App (Frontend). This IPA is unsigned and must be sideloaded (AltStore/Sideloadly)."
