name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Dependencies
        working-directory: frontend 
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🍏 Install Pods
        working-directory: frontend/ios
        run: pod install --repo-update

      - name: 🆔 Bypass Team ID Requirement
        # This tricks Xcode into thinking a team is assigned so it doesn't fail the build
        working-directory: frontend/ios
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "1234567890";/g' Runner.xcodeproj/project.pbxproj

      - name: 🛠️ Build iOS (No-Sign)
        working-directory: frontend
        run: |
          # We build for 'ios' (physical) but disable signing 
          # to ensure the output goes to build/ios/iphoneos
          flutter build ios --release --no-codesign

      - name: 🏗️ Create IPA Structure
        run: |
          # Using the correct path for physical device builds
          cd frontend/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -qq -r -9 GroceryApp.ipa Payload
          
      - name: 🚀 Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: frontend/build/ios/iphoneos/GroceryApp.ipa
          asset_name: GroceryApp-Unsigned.ipa
          tag: v1.0.0
          overwrite: true
          body: "Automated iOS build. This IPA is unsigned and must be sideloaded (AltStore/Sideloadly)."
