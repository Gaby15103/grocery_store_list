name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Dependencies
        working-directory: frontend 
        run: |
          flutter pub get
          # Note: Avoid comments in JSON if your build_runner config uses it
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🍏 Install Pods
        working-directory: frontend/ios
        run: pod install --repo-update

      - name: 🆔 Force Disable Code Signing
        # This replaces the Team ID and explicitly tells Xcode signing is NOT required
        working-directory: frontend/ios
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "-";/g' Runner.xcodeproj/project.pbxproj
          echo "CODE_SIGNING_ALLOWED = NO" >> Runner.xcodeproj/project.pbxproj
          echo "CODE_SIGNING_REQUIRED = NO" >> Runner.xcodeproj/project.pbxproj

      - name: 🛠️ Build iOS (No-Sign)
        working-directory: frontend
        # We build 'ios' instead of 'ipa' here because 'ipa' command 
        # often enforces signing more strictly than the raw build.
        run: flutter build ios --release --no-codesign

      - name: 🏗️ Create IPA Structure
        working-directory: frontend/build/ios/iphoneos
        run: |
          mkdir Payload
          cp -r Runner.app Payload/
          zip -qq -r -9 GroceryApp.ipa Payload
          
      - name: 🚀 Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: frontend/build/ios/iphoneos/GroceryApp.ipa
          asset_name: GroceryApp-Unsigned.ipa
          tag: v1.0.0
          overwrite: true
          body: "Automated iOS build for grocery_store_list. This IPA is unsigned."
