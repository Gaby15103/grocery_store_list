services:
  postgres:
    image: postgres:16
    container_name: postgres_grocery_list
    env_file:
      - .env
    ports:
      - '5433:5432'
    volumes:
      - postgresDb:/var/lib/postgresql

  backend:
    build: ./backend
    container_name: grocery_backend
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgresDb:
