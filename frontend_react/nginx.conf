server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. FORCE NO-CACHE for PWA Entry & Manifest files
    # The browser must always check the server for these to detect updates.
    location ~* (index.html|manifest.json|asset-manifest.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # 2. SPA Client-Side Routing Fallback
    # Routes deep linking web paths (like /setup) back to index.html so Expo Router can parse them.
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/mime.types;
    }

    # 3. Aggressive Long-Term Caching for Static Assets & Bundles
    # Since Expo appends build hashes to JS/CSS files and asset paths,
    # we can safely cache them for a year. If you update the app, the hash changes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}