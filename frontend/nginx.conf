server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    types {
        application/javascript    js;
        font/opentype             otf;
        font/truetype             ttf;
        image/svg+xml             svg;
    }

    # 1. FORCE NO-CACHE for the entry points
    # This ensures the browser always asks the server for the latest version info
    location ~* (index.html|flutter_service_worker.js|version.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # 2. Add cache busting to the JS files
    # Instead of caching all JS for a year, we force re-validation
    location ~* \.js$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 3. Standard Flutter routing
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/mime.types;
    }

    # 4. Long-term cache only for actual static assets (images/icons)
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}

